<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <title>題庫小天使舊版封存</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --surface: #ffffff;
      --ink: #1d2521;
      --muted: #65716b;
      --line: #d8ded9;
      --blue: #315f9c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    p {
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      display: flex;
      align-items: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      margin-top: 10px;
    }
  </style>
